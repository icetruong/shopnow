spring.application.name=user-service

spring.datasource.url=jdbc:postgresql://localhost:5432/user_service_db
spring.datasource.username=postgres
spring.datasource.password=123456

server.port=8081

spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/public.pem

spring.data.redis.host=localhost
spring.data.redis.port=6379


jwt.access-token-expiry= 900
jwt.refresh-token-expiry = 2592000
jwt.reset-password-token-expiry = 900

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}


file.upload-dir= uploads/avatars
file.base-url= http://localhost:8081

oauth2.frontend-redirect-uri=http://localhost:3000/oauth2/redirect

internal.secret-token = ${INTERNAL_SECRET_TOKEN}

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

